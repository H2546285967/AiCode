apiVersion: v1
kind: app
app:
  id: "773831948967372486"
  name: "智能问数测试应用07"
  type: "4"
  icon: "icon-sql"
  remark: "测试应用"
  version: "v1.0.0"

# 数据源配置（用于关联 agent_db_datasource_connection）
datasource:
  id: "1997904123342417920"  # 数据源ID，需提前存在

# 智能问数配置
nl2sqlConfig:
  datasourceConnId: "1997904123342417920"  # 关联数据源ID
  rewriteClarifyConfig: "{\"enable\":true,\"model\":\"gpt-3.5-turbo\",\"temperature\":0.7}"
  schemaRecallConfig: "{\"topK\":5,\"similarityThreshold\":0.8,\"model\":\"text-embedding-ada-002\"}"
  sqlGenConfig: "{\"model\":\"gpt-4\",\"maxTokens\":1000,\"temperature\":0.3}"
  sqlFixConfig: "{\"enable\":true,\"model\":\"gpt-3.5-turbo\",\"maxRetries\":3}"
  chartGenConfig: "{\"enable\":true,\"chartTypes\":[\"bar\",\"line\",\"pie\"]}"
  externalInfo: '{"isSmallTalk":false,"rejectContent":"您好，我没有检索到相关数据，请您换个问题进行提问！"}'

  