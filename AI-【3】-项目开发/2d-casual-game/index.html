<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D 休闲闯关小游戏</title>
<style>
/* ========== 全局样式 ========== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Microsoft YaHei', sans-serif;
  overflow: hidden;
}
/* 游戏容器 */
#game-container {
  position: relative;
  width: 800px;
  height: 600px;
}
/* 画布 */
canvas {
  display: block;
  border: 2px solid #16213e;
  border-radius: 8px;
}
/* UI 覆盖层 */
#ui-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
/* 顶部信息栏 */
#info-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 20px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 16px;
  border-radius: 8px 8px 0 0;
  pointer-events: auto;
}
#info-bar span { margin: 0 15px; }
.info-label { color: #aaa; }
.info-value { color: #ffd700; font-weight: bold; font-size: 18px; }
.life-value { color: #ff4757; }
.time-value { color: #2ed573; }
/* 开始界面 */
#start-screen, #end-screen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.85);
  color: #fff;
  border-radius: 8px;
  pointer-events: auto;
  z-index: 10;
}
#start-screen h1 {
  font-size: 48px;
  margin-bottom: 20px;
  color: #ffd700;
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
}
#start-screen p {
  font-size: 18px;
  color: #aaa;
  margin-bottom: 10px;
}
#end-screen h1 { font-size: 42px; margin-bottom: 15px; color: #ff6b6b; }
#end-screen .final-score {
  font-size: 64px;
  color: #ffd700;
  margin: 15px 0;
  font-weight: bold;
}
#end-screen .stats { color: #aaa; font-size: 16px; margin-bottom: 25px; }
.btn {
  padding: 14px 48px;
  font-size: 20px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  font-weight: bold;
  pointer-events: auto;
}
.btn:hover { transform: scale(1.05); }
.btn-start {
  background: linear-gradient(135deg, #ffd700, #ffaa00);
  color: #1a1a2e;
  box-shadow: 0 4px 15px rgba(255,215,0,0.4);
}
.btn-restart {
  background: linear-gradient(135deg, #2ed573, #17c964);
  color: #fff;
  box-shadow: 0 4px 15px rgba(46,213,115,0.4);
}
.controls-hint {
  margin-top: 30px;
  color: #666;
  font-size: 14px;
}
.controls-hint kbd {
  background: #333;
  padding: 3px 8px;
  border-radius: 4px;
  border: 1px solid #555;
  font-size: 13px;
}
</style>
</head>
<body>

<div id="game-container">
  <!-- 游戏画布 -->
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <!-- UI 覆盖层：分数、生命、倒计时 -->
  <div id="ui-overlay">
    <div id="info-bar">
      <span><span class="info-label">分数：</span><span class="info-value" id="score-display">0</span></span>
      <span><span class="info-label">生命：</span><span class="life-value" id="life-display">❤❤❤</span></span>
      <span><span class="info-label">时间：</span><span class="time-value" id="time-display">90</span></span>
    </div>
  </div>

  <!-- 开始界面 -->
  <div id="start-screen">
    <h1>🎯 休闲闯关</h1>
    <p>收集星星得分，躲避红色障碍</p>
    <p>坚持 90 秒，看看你能拿多少分！</p>
    <button class="btn btn-start" id="btn-start">开始游戏</button>
    <div class="controls-hint">
      操作：<kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 方向键移动
    </div>
  </div>

  <!-- 游戏结束界面 -->
  <div id="end-screen" style="display:none;">
    <h1>游戏结束</h1>
    <div class="final-score" id="final-score">0</div>
    <p style="color:#aaa;font-size:18px;">最终得分</p>
    <div class="stats" id="end-stats"></div>
    <button class="btn btn-restart" id="btn-restart">再来一局</button>
  </div>
</div>

<script>
// ============================================================
// 2D 休闲闯关小游戏 - 完整实现
// 技术：原生 HTML5 + Canvas + JavaScript
// 无任何外部依赖，双击 index.html 即可运行
// ============================================================

(function() {
  'use strict';

  // ========== 常量配置 ==========
  var CANVAS_W = 800;           // 画布宽度
  var CANVAS_H = 600;           // 画布高度
  var PLAYER_SIZE = 30;         // 玩家尺寸（正方形边长）
  var PLAYER_SPEED = 5;         // 玩家移动速度（像素/帧）
  var COLLECTIBLE_SIZE = 24;    // 目标物体尺寸
  var OBSTACLE_SIZE = 28;       // 障碍物尺寸
  var COLLECTIBLE_SCORE = 10;   // 每个目标加分值
  var INITIAL_LIVES = 3;        // 初始生命值
  var GAME_DURATION = 90;       // 游戏总时长（秒）
  var MAX_COLLECTIBLES = 8;     // 同时存在的目标物体最大数量
  var MAX_OBSTACLES = 6;        // 同时存在的障碍物最大数量
  var SPAWN_INTERVAL = 2000;    // 物体刷新间隔（毫秒）
  var INVINCIBLE_TIME = 1000;   // 受伤后无敌时间（毫秒）

  // ========== 获取 DOM 元素 ==========
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var scoreDisplay = document.getElementById('score-display');
  var lifeDisplay = document.getElementById('life-display');
  var timeDisplay = document.getElementById('time-display');
  var startScreen = document.getElementById('start-screen');
  var endScreen = document.getElementById('end-screen');
  var finalScoreEl = document.getElementById('final-score');
  var endStatsEl = document.getElementById('end-stats');
  var btnStart = document.getElementById('btn-start');
  var btnRestart = document.getElementById('btn-restart');

  // ========== 游戏状态变量 ==========
  var gameState = 'start';      // 'start' | 'playing' | 'ended'
  var score = 0;                // 当前分数
  var lives = INITIAL_LIVES;    // 当前生命值
  var timeLeft = GAME_DURATION; // 剩余时间（秒）
  var player = {};              // 玩家对象
  var collectibles = [];        // 目标物体数组
  var obstacles = [];           // 障碍物数组
  var particles = [];           // 粒子特效数组
  var keys = {};                // 按键状态表（防抖多键）
  var lastSpawnTime = 0;        // 上次刷新物体的时间
  var lastTimeUpdate = 0;       // 上次更新倒计时的时间
  var invincibleUntil = 0;      // 无敌截止时间戳
  var gameStartTime = 0;        // 游戏开始时间戳
  var animFrameId = 0;          // 动画帧 ID

  // ========== 玩家对象初始化 ==========
  function initPlayer() {
    player = {
      x: CANVAS_W / 2 - PLAYER_SIZE / 2,
      y: CANVAS_H / 2 - PLAYER_SIZE / 2,
      w: PLAYER_SIZE,
      h: PLAYER_SIZE,
      color: '#4ecdc4',
      trail: []  // 移动轨迹（拖尾特效）
    };
  }

  // ========== 随机数工具函数 ==========
  // 生成 [min, max) 之间的随机整数
  function randInt(min, max) {
    return Math.floor(Math.random() * (max - min)) + min;
  }

  // ========== 碰撞检测（AABB 矩形碰撞） ==========
  function isColliding(a, b) {
    return a.x < b.x + b.w &&
           a.x + a.w > b.x &&
           a.y < b.y + b.h &&
           a.y + a.h > b.y;
  }

  // ========== 检查新物体是否会与已有物体重叠 ==========
  function isOverlapping(newObj, existingList, size) {
    for (var i = 0; i < existingList.length; i++) {
      var other = existingList[i];
      // 如果两物体中心距离小于尺寸之和，则视为重叠
      var dx = (newObj.x + size / 2) - (other.x + size / 2);
      var dy = (newObj.y + size / 2) - (other.y + size / 2);
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < size * 1.5) return true;
    }
    return false;
  }

  // ========== 生成目标物体（星星） ==========
  function spawnCollectible() {
    if (collectibles.length >= MAX_COLLECTIBLES) return;
    var obj = {
      x: randInt(20, CANVAS_W - COLLECTIBLE_SIZE - 20),
      y: randInt(60, CANVAS_H - COLLECTIBLE_SIZE - 20),  // 60px 留给顶部 UI
      w: COLLECTIBLE_SIZE,
      h: COLLECTIBLE_SIZE,
      color: '#ffd700',
      // 浮动动画偏移量
      floatOffset: Math.random() * Math.PI * 2
    };
    // 检查不与玩家重叠
    if (isColliding(obj, [player], COLLECTIBLE_SIZE)) return;
    // 检查不与障碍物重叠
    if (isOverlapping(obj, obstacles, COLLECTIBLE_SIZE)) return;
    collectibles.push(obj);
  }

  // ========== 生成障碍物（红色方块） ==========
  function spawnObstacle() {
    if (obstacles.length >= MAX_OBSTACLES) return;
    var obj = {
      x: randInt(20, CANVAS_W - OBSTACLE_SIZE - 20),
      y: randInt(60, CANVAS_H - OBSTACLE_SIZE - 20),
      w: OBSTACLE_SIZE,
      h: OBSTACLE_SIZE,
      color: '#ff4757',
      // 移动速度和方向（障碍物会缓慢移动）
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2
    };
    // 检查不与玩家重叠
    if (isColliding(obj, [player], OBSTACLE_SIZE)) return;
    // 检查不与其他障碍物重叠
    if (isOverlapping(obj, obstacles, OBSTACLE_SIZE)) return;
    // 检查不与目标物体重叠
    if (isOverlapping(obj, collectibles, OBSTACLE_SIZE)) return;
    obstacles.push(obj);
  }

  // ========== 创建粒子特效 ==========
  function createParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      particles.push({
        x: x,
        y: y,
        vx: (Math.random() - 0.5) * 6,
        vy: (Math.random() - 0.5) * 6,
        life: 1.0,        // 生命值 1→0 渐隐
        decay: 0.02 + Math.random() * 0.03,
        size: 3 + Math.random() * 4,
        color: color
      });
    }
  }

  // ========== 更新粒子 ==========
  function updateParticles() {
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= p.decay;
      if (p.life <= 0) {
        particles.splice(i, 1);
      }
    }
  }

  // ========== 绘制粒子 ==========
  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ========== 玩家移动逻辑 ==========
  function movePlayer() {
    // 记录轨迹（拖尾特效）
    player.trail.push({ x: player.x, y: player.y, life: 1 });
    if (player.trail.length > 8) player.trail.shift();

    // 根据按键状态移动（支持多键同时按下）
    if (keys['ArrowUp'] || keys['w'] || keys['W']) {
      player.y -= PLAYER_SPEED;
    }
    if (keys['ArrowDown'] || keys['s'] || keys['S']) {
      player.y += PLAYER_SPEED;
    }
    if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
      player.x -= PLAYER_SPEED;
    }
    if (keys['ArrowRight'] || keys['d'] || keys['D']) {
      player.x += PLAYER_SPEED;
    }

    // 边界限制（不能移出画布）
    if (player.x < 0) player.x = 0;
    if (player.y < 60) player.y = 60;  // 顶部留 60px 给 UI
    if (player.x + player.w > CANVAS_W) player.x = CANVAS_W - player.w;
    if (player.y + player.h > CANVAS_H) player.y = CANVAS_H - player.h;
  }

  // ========== 障碍物移动逻辑 ==========
  function moveObstacles() {
    for (var i = 0; i < obstacles.length; i++) {
      var obs = obstacles[i];
      obs.x += obs.vx;
      obs.y += obs.vy;

      // 碰到边界反弹
      if (obs.x <= 0 || obs.x + obs.w >= CANVAS_W) {
        obs.vx *= -1;
        obs.x = Math.max(0, Math.min(obs.x, CANVAS_W - obs.w));
      }
      if (obs.y <= 60 || obs.y + obs.h >= CANVAS_H) {
        obs.vy *= -1;
        obs.y = Math.max(60, Math.min(obs.y, CANVAS_H - obs.h));
      }
    }
  }

  // ========== 碰撞检测 ==========
  function checkCollisions() {
    var now = Date.now();

    // 检测与目标物体碰撞（加分）
    for (var i = collectibles.length - 1; i >= 0; i--) {
      if (isColliding(player, collectibles[i])) {
        score += COLLECTIBLE_SCORE;
        // 碰撞位置生成金色粒子
        createParticles(
          collectibles[i].x + COLLECTIBLE_SIZE / 2,
          collectibles[i].y + COLLECTIBLE_SIZE / 2,
          '#ffd700', 12
        );
        collectibles.splice(i, 1);
        // 立即补充一个新的目标
        spawnCollectible();
      }
    }

    // 检测与障碍物碰撞（扣血，有无敌时间保护）
    if (now > invincibleUntil) {
      for (var j = obstacles.length - 1; j >= 0; j--) {
        if (isColliding(player, obstacles[j])) {
          lives--;
          invincibleUntil = now + INVINCIBLE_TIME;
          // 碰撞位置生成红色粒子
          createParticles(
            obstacles[j].x + OBSTACLE_SIZE / 2,
            obstacles[j].y + OBSTACLE_SIZE / 2,
            '#ff4757', 15
          );
          // 移除被碰到的障碍物并补充新的
          obstacles.splice(j, 1);
          spawnObstacle();
          // 生命值为 0 时结束游戏
          if (lives <= 0) {
            endGame();
            return;
          }
          break;  // 每帧只处理一次碰撞
        }
      }
    }
  }

  // ========== 更新倒计时 ==========
  function updateTimer(timestamp) {
    if (timestamp - lastTimeUpdate >= 1000) {
      lastTimeUpdate = timestamp;
      timeLeft--;
      if (timeLeft <= 0) {
        timeLeft = 0;
        endGame();
      }
    }
  }

  // ========== 定时刷新物体 ==========
  function checkSpawn(timestamp) {
    if (timestamp - lastSpawnTime >= SPAWN_INTERVAL) {
      lastSpawnTime = timestamp;
      spawnCollectible();
      spawnObstacle();
    }
  }

  // ========== 绘制背景 ==========
  function drawBackground() {
    // 深色背景
    ctx.fillStyle = '#0f0f23';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // 网格线（装饰）
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (var x = 0; x < CANVAS_W; x += 40) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, CANVAS_H);
      ctx.stroke();
    }
    for (var y = 0; y < CANVAS_H; y += 40) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(CANVAS_W, y);
      ctx.stroke();
    }
  }

  // ========== 绘制玩家（带拖尾和无敌闪烁） ==========
  function drawPlayer() {
    var now = Date.now();

    // 绘制拖尾
    for (var i = 0; i < player.trail.length; i++) {
      var t = player.trail[i];
      var alpha = (i / player.trail.length) * 0.3;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = player.color;
      var shrink = (player.trail.length - i) * 2;
      ctx.fillRect(
        t.x + shrink / 2,
        t.y + shrink / 2,
        player.w - shrink,
        player.h - shrink
      );
    }
    ctx.globalAlpha = 1;

    // 无敌状态下闪烁
    if (now < invincibleUntil && Math.floor(now / 100) % 2 === 0) {
      ctx.globalAlpha = 0.4;
    }

    // 绘制玩家主体
    ctx.fillStyle = player.color;
    ctx.shadowColor = player.color;
    ctx.shadowBlur = 15;
    // 圆角矩形
    var r = 6;
    ctx.beginPath();
    ctx.moveTo(player.x + r, player.y);
    ctx.lineTo(player.x + player.w - r, player.y);
    ctx.quadraticCurveTo(player.x + player.w, player.y, player.x + player.w, player.y + r);
    ctx.lineTo(player.x + player.w, player.y + player.h - r);
    ctx.quadraticCurveTo(player.x + player.w, player.y + player.h, player.x + player.w - r, player.y + player.h);
    ctx.lineTo(player.x + r, player.y + player.h);
    ctx.quadraticCurveTo(player.x, player.y + player.h, player.x, player.y + player.h - r);
    ctx.lineTo(player.x, player.y + r);
    ctx.quadraticCurveTo(player.x, player.y, player.x + r, player.y);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;

    // 玩家眼睛
    ctx.fillStyle = '#fff';
    ctx.fillRect(player.x + 8, player.y + 10, 5, 5);
    ctx.fillRect(player.x + 17, player.y + 10, 5, 5);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(player.x + 9, player.y + 11, 3, 3);
    ctx.fillRect(player.x + 18, player.y + 11, 3, 3);
  }

  // ========== 绘制目标物体（星星） ==========
  function drawCollectibles(time) {
    for (var i = 0; i < collectibles.length; i++) {
      var c = collectibles[i];
      // 上下浮动动画
      var floatY = Math.sin(time / 500 + c.floatOffset) * 4;

      ctx.fillStyle = c.color;
      ctx.shadowColor = c.color;
      ctx.shadowBlur = 12;
      ctx.font = (COLLECTIBLE_SIZE + 4) + 'px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⭐', c.x + c.w / 2, c.y + c.h / 2 + floatY);
      ctx.shadowBlur = 0;
    }
  }

  // ========== 绘制障碍物（旋转的红色方块） ==========
  function drawObstacles(time) {
    for (var i = 0; i < obstacles.length; i++) {
      var o = obstacles[i];
      var cx = o.x + o.w / 2;
      var cy = o.y + o.h / 2;
      var angle = time / 1000 + i;  // 每个障碍物旋转角度不同

      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);
      ctx.fillStyle = o.color;
      ctx.shadowColor = o.color;
      ctx.shadowBlur = 10;
      ctx.fillRect(-o.w / 2, -o.h / 2, o.w, o.h);
      ctx.shadowBlur = 0;

      // 中心白色 X 标记
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-6, -6);
      ctx.lineTo(6, 6);
      ctx.moveTo(6, -6);
      ctx.lineTo(-6, 6);
      ctx.stroke();

      ctx.restore();
    }
  }

  // ========== 更新 UI 显示 ==========
  function updateUI() {
    scoreDisplay.textContent = score;
    // 生命值用红心表示
    var hearts = '';
    for (var i = 0; i < lives; i++) hearts += '❤';
    for (var j = lives; j < INITIAL_LIVES; j++) hearts += '♡';
    lifeDisplay.textContent = hearts;
    timeDisplay.textContent = timeLeft;
  }

  // ========== 游戏主循环 ==========
  function gameLoop(timestamp) {
    if (gameState !== 'playing') return;

    // 更新倒计时
    updateTimer(timestamp);

    // 检查是否需要刷新物体
    checkSpawn(timestamp);

    // 移动玩家
    movePlayer();

    // 移动障碍物
    moveObstacles();

    // 碰撞检测
    checkCollisions();

    // 更新粒子
    updateParticles();

    // 清空画布并绘制所有内容
    drawBackground();
    drawCollectibles(timestamp);
    drawObstacles(timestamp);
    drawPlayer();
    drawParticles();

    // 更新 UI
    updateUI();

    // 更新轨迹生命值
    for (var i = player.trail.length - 1; i >= 0; i--) {
      player.trail[i].life -= 0.05;
      if (player.trail[i].life <= 0) player.trail.splice(i, 1);
    }

    // 请求下一帧
    animFrameId = requestAnimationFrame(gameLoop);
  }

  // ========== 开始游戏 ==========
  function startGame() {
    // 重置所有状态
    gameState = 'playing';
    score = 0;
    lives = INITIAL_LIVES;
    timeLeft = GAME_DURATION;
    collectibles = [];
    obstacles = [];
    particles = [];
    invincibleUntil = 0;
    lastSpawnTime = Date.now();
    lastTimeUpdate = Date.now();

    // 初始化玩家
    initPlayer();

    // 隐藏开始/结束界面
    startScreen.style.display = 'none';
    endScreen.style.display = 'none';

    // 初始生成几个物体
    for (var i = 0; i < 5; i++) spawnCollectible();
    for (var j = 0; j < 3; j++) spawnObstacle();

    // 启动游戏循环
    animFrameId = requestAnimationFrame(gameLoop);
  }

  // ========== 结束游戏 ==========
  function endGame() {
    gameState = 'ended';
    cancelAnimationFrame(animFrameId);

    // 显示结束界面
    finalScoreEl.textContent = score;
    endStatsEl.textContent = '生命值：' + lives + ' | 用时：' + (GAME_DURATION - timeLeft) + '秒';
    endScreen.style.display = 'flex';
  }

  // ========== 键盘事件监听（防抖多键） ==========
  document.addEventListener('keydown', function(e) {
    // 阻止方向键滚动页面
    if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].indexOf(e.key) !== -1) {
      e.preventDefault();
    }
    keys[e.key] = true;
  });

  document.addEventListener('keyup', function(e) {
    keys[e.key] = false;
  });

  // 窗口失焦时清空按键状态（防止卡键）
  window.addEventListener('blur', function() {
    keys = {};
  });

  // ========== 按钮事件绑定 ==========
  btnStart.addEventListener('click', function() {
    startGame();
  });

  btnRestart.addEventListener('click', function() {
    startGame();
  });

  // ========== 页面加载完成后绘制初始画面 ==========
  function drawInitialScreen() {
    drawBackground();
    // 画布中央画一个大的装饰图案
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.font = '120px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🎯', CANVAS_W / 2, CANVAS_H / 2);
  }

  // 初始化
  initPlayer();
  drawInitialScreen();

})();
</script>
</body>
</html>
