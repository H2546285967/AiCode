<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>三消消消乐</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Microsoft YaHei', sans-serif;
  overflow: hidden;
}
#game-container {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#info-panel {
  display: flex;
  justify-content: space-around;
  width: 520px;
  padding: 15px 0;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  color: #fff;
  font-size: 18px;
}
#info-panel span { margin: 0 20px; }
.panel-label { color: #aaa; }
.panel-value { font-weight: bold; font-size: 24px; }
.score-val { color: #ffd43b; }
.steps-val { color: #51cf66; }
canvas {
  border-radius: 12px;
  cursor: pointer;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
#start-screen, #end-screen {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.88);
  color: #fff;
  border-radius: 12px;
  z-index: 10;
}
#start-screen h1 {
  font-size: 52px;
  margin-bottom: 15px;
  background: linear-gradient(135deg, #ff6b6b, #ffd43b, #51cf66, #339af0, #cc5de8);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#start-screen p { color: #aaa; font-size: 16px; margin: 4px 0; }
#end-screen h1 { font-size: 42px; margin-bottom: 10px; color: #ff6b6b; }
#end-screen .final-score {
  font-size: 72px;
  color: #ffd43b;
  font-weight: bold;
  margin: 10px 0;
}
#end-screen .stats { color: #aaa; font-size: 16px; margin-bottom: 25px; }
.btn {
  padding: 14px 48px;
  font-size: 20px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  font-weight: bold;
  transition: transform 0.2s;
  margin-top: 15px;
}
.btn:hover { transform: scale(1.05); }
.btn-start {
  background: linear-gradient(135deg, #ffd43b, #ffaa00);
  color: #1a1a2e;
}
.btn-restart {
  background: linear-gradient(135deg, #51cf66, #17c964);
  color: #fff;
}
</style>
</head>
<body>

<div id="game-container">
  <div id="info-panel">
    <span><span class="panel-label">分数：</span><span class="panel-value score-val" id="score-display">0</span></span>
    <span><span class="panel-label">剩余步数：</span><span class="panel-value steps-val" id="steps-display">35</span></span>
  </div>
  <canvas id="gameCanvas"></canvas>
  <div id="start-screen">
    <h1>🎯 消消乐</h1>
    <p>交换相邻方块，三个及以上相同颜色自动消除</p>
    <p>35 步内尽可能拿高分！</p>
    <button class="btn btn-start" id="btn-start">开始游戏</button>
  </div>
  <div id="end-screen" style="display:none;">
    <h1>🎉 游戏结束</h1>
    <div class="final-score" id="final-score">0</div>
    <p style="color:#aaa;">最终得分</p>
    <div class="stats" id="end-stats"></div>
    <button class="btn btn-restart" id="btn-restart">再来一局</button>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ================================================================
  //  CONFIG — 全局配置（修改此处即可调整游戏参数）
  // ================================================================
  var CONFIG = {
    ROWS: 8,                // 棋盘行数
    COLS: 8,                // 棋盘列数
    BLOCK_TYPES: 5,         // 方块颜色种类数
    CELL_SIZE: 60,          // 每个方块像素大小
    PADDING: 4,             // 方块间距
    BORDER_RADIUS: 10,      // 方块圆角半径
    BOARD_BG: '#252540',    // 棋盘背景色
    INITIAL_STEPS: 35,      // 初始步数
    SCORE_3: 10,            // 3 连消除得分
    SCORE_4: 25,            // 4 连消除得分
    SCORE_5: 50,            // 5+ 连消除得分
    CHAIN_BONUS: 15,        // 每层连锁额外加分
    ANIM_SWAP_MS: 180,      // 交换动画时长
    ANIM_ELIM_MS: 280,      // 消除动画时长
    ANIM_DROP_MS: 220,      // 下落动画时长
    BLOCK_STYLES: [
      { top: '#ff8787', bottom: '#e03131', border: '#c92a2a' },  // 红
      { top: '#69db7c', bottom: '#2f9e44', border: '#237032' },  // 绿
      { top: '#74c0fc', bottom: '#1971c2', border: '#1864ab' },  // 蓝
      { top: '#ffe066', bottom: '#e67700', border: '#cc8400' },  // 黄
      { top: '#da77f2', bottom: '#9c36b5', border: '#862e9c' }   // 紫
    ]
  };

  var CANVAS_W = CONFIG.COLS * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
  var CANVAS_H = CONFIG.ROWS * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;

  // ================================================================
  //  DOM 引用
  // ================================================================
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  canvas.width = CANVAS_W;
  canvas.height = CANVAS_H;
  var scoreDisplay = document.getElementById('score-display');
  var stepsDisplay = document.getElementById('steps-display');
  var startScreen = document.getElementById('start-screen');
  var endScreen = document.getElementById('end-screen');
  var finalScoreEl = document.getElementById('final-score');
  var endStatsEl = document.getElementById('end-stats');
  var btnStart = document.getElementById('btn-start');
  var btnRestart = document.getElementById('btn-restart');

  // ================================================================
  //  State — 游戏状态
  // ================================================================
  var board = [];
  var score = 0;
  var steps = 0;
  var selected = null;
  var isAnimating = false;
  var gameState = 'start';

  // ================================================================
  //  Board — 棋盘生成
  // ================================================================

  /** 生成随机方块类型 0~4 */
  function randType() {
    return Math.floor(Math.random() * CONFIG.BLOCK_TYPES);
  }

  /** 判断在 (row,col) 放 type 是否会形成三消 */
  function wouldMatch(row, col, type) {
    if (col >= 2 && board[row][col - 1] === type && board[row][col - 2] === type) return true;
    if (row >= 2 && board[row - 1][col] === type && board[row - 2][col] === type) return true;
    return false;
  }

  /** 初始化棋盘，确保开局无三消 */
  function generateBoard() {
    board = [];
    for (var r = 0; r < CONFIG.ROWS; r++) {
      board[r] = [];
      for (var c = 0; c < CONFIG.COLS; c++) {
        var type;
        do { type = randType(); } while (wouldMatch(r, c, type));
        board[r][c] = type;
      }
    }
  }

  /** 坐标是否在棋盘内 */
  function inBoard(row, col) {
    return row >= 0 && row < CONFIG.ROWS && col >= 0 && col < CONFIG.COLS;
  }

  /** 两个格子是否相邻（上下左右） */
  function isAdjacent(r1, c1, r2, c2) {
    return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
  }

  // ================================================================
  //  Matcher — 消除判定 + 分数
  // ================================================================

  /** 查找所有横/纵 ≥3 的连续相同方块，返回去重坐标数组 */
  function findMatches() {
    var matched = {};
    // 横向
    for (var r = 0; r < CONFIG.ROWS; r++) {
      var c = 0;
      while (c < CONFIG.COLS) {
        var type = board[r][c];
        if (type === -1) { c++; continue; }
        var end = c + 1;
        while (end < CONFIG.COLS && board[r][end] === type) end++;
        if (end - c >= 3) {
          for (var i = c; i < end; i++) matched[r + ',' + i] = { row: r, col: i };
        }
        c = end;
      }
    }
    // 纵向
    for (var col = 0; col < CONFIG.COLS; col++) {
      var rr = 0;
      while (rr < CONFIG.ROWS) {
        var tp = board[rr][col];
        if (tp === -1) { rr++; continue; }
        var endR = rr + 1;
        while (endR < CONFIG.ROWS && board[endR][col] === tp) endR++;
        if (endR - rr >= 3) {
          for (var j = rr; j < endR; j++) matched[j + ',' + col] = { row: j, col: col };
        }
        rr = endR;
      }
    }
    var result = [];
    for (var key in matched) result.push(matched[key]);
    return result;
  }

  /** 计算得分：3=10, 4=25, 5+=50, 连锁每层+15 */
  function calculateScore(count, chainLevel) {
    var base = count >= 5 ? CONFIG.SCORE_5 : count >= 4 ? CONFIG.SCORE_4 : CONFIG.SCORE_3;
    return base + chainLevel * CONFIG.CHAIN_BONUS;
  }

  // ================================================================
  //  Animator — 动画系统
  // ================================================================

  function delay(ms) {
    return new Promise(function(resolve) { setTimeout(resolve, ms); });
  }

  /** 通用补间动画 + easeOutQuad 缓动 */
  function tween(duration, onFrame) {
    return new Promise(function(resolve) {
      var startTime = performance.now();
      function step(now) {
        var t = Math.min((now - startTime) / duration, 1);
        var ease = 1 - (1 - t) * (1 - t);
        onFrame(ease);
        if (t < 1) requestAnimationFrame(step);
        else resolve();
      }
      requestAnimationFrame(step);
    });
  }

  /** 交换动画 */
  async function animateSwap(r1, c1, r2, c2) {
    await tween(CONFIG.ANIM_SWAP_MS, function(t) {
      drawBoardWithOffset(r1, c1, r2, c2, t);
    });
  }

  /** 带偏移绘制（交换动画用） */
  function drawBoardWithOffset(r1, c1, r2, c2, t) {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    drawBoardBackground();
    var dx = (c2 - c1) * (CONFIG.CELL_SIZE + CONFIG.PADDING) * t;
    var dy = (r2 - r1) * (CONFIG.CELL_SIZE + CONFIG.PADDING) * t;
    for (var r = 0; r < CONFIG.ROWS; r++) {
      for (var c = 0; c < CONFIG.COLS; c++) {
        if (board[r][c] === -1) continue;
        var x = c * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
        var y = r * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
        if (r === r1 && c === c1) drawBlock(x + dx, y + dy, board[r][c], false);
        else if (r === r2 && c === c2) drawBlock(x - dx, y - dy, board[r][c], false);
        else drawBlock(x, y, board[r][c], false);
      }
    }
  }

  /** 消除动画：渐隐 + 缩小 */
  async function animateEliminate(matches) {
    var matchSet = {};
    for (var i = 0; i < matches.length; i++) matchSet[matches[i].row + ',' + matches[i].col] = true;
    await tween(CONFIG.ANIM_ELIM_MS, function(t) {
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      drawBoardBackground();
      for (var r = 0; r < CONFIG.ROWS; r++) {
        for (var c = 0; c < CONFIG.COLS; c++) {
          if (board[r][c] === -1) continue;
          var x = c * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
          var y = r * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
          if (matchSet[r + ',' + c]) {
            var scale = 1 - t * 0.5;
            var size = CONFIG.CELL_SIZE * scale;
            ctx.globalAlpha = 1 - t;
            drawBlock(x + (CONFIG.CELL_SIZE - size) / 2, y + (CONFIG.CELL_SIZE - size) / 2, board[r][c], false, size);
            ctx.globalAlpha = 1;
          } else {
            drawBlock(x, y, board[r][c], false);
          }
        }
      }
    });
    for (var j = 0; j < matches.length; j++) board[matches[j].row][matches[j].col] = -1;
  }

  /** 下落动画：上方方块下落 + 顶部补新方块 */
  async function animateDrop() {
    var drops = [];
    for (var c = 0; c < CONFIG.COLS; c++) {
      var emptyCount = 0;
      for (var r = CONFIG.ROWS - 1; r >= 0; r--) {
        if (board[r][c] === -1) emptyCount++;
        else if (emptyCount > 0) drops.push({ col: c, fromR: r, toR: r + emptyCount, type: board[r][c] });
      }
      for (var n = 0; n < emptyCount; n++) {
        drops.push({ col: c, fromR: -(emptyCount - n), toR: n, type: randType() });
      }
    }
    if (drops.length === 0) return;
    await tween(CONFIG.ANIM_DROP_MS, function(t) {
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      drawBoardBackground();
      var dropSet = {};
      for (var i = 0; i < drops.length; i++) dropSet[drops[i].col + ',' + drops[i].fromR] = true;
      for (var r = 0; r < CONFIG.ROWS; r++) {
        for (var c = 0; c < CONFIG.COLS; c++) {
          if (board[r][c] !== -1 && !dropSet[c + ',' + r]) {
            var x = c * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
            var y = r * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
            drawBlock(x, y, board[r][c], false);
          }
        }
      }
      for (var j = 0; j < drops.length; j++) {
        var d = drops[j];
        var sx = d.col * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
        var sy = d.fromR * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
        var ey = d.toR * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
        drawBlock(sx, sy + (ey - sy) * t, d.type, false);
      }
    });
    // 更新 board
    for (var c2 = 0; c2 < CONFIG.COLS; c2++) {
      for (var r2 = 0; r2 < CONFIG.ROWS; r2++) board[r2][c2] = -1;
    }
    for (var k = 0; k < drops.length; k++) {
      var dd = drops[k];
      if (dd.toR >= 0 && dd.toR < CONFIG.ROWS) board[dd.toR][dd.col] = dd.type;
    }
  }

  // ================================================================
  //  Renderer — 绘制
  // ================================================================

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawBoardBackground() {
    ctx.fillStyle = CONFIG.BOARD_BG;
    roundRect(-4, -4, CANVAS_W + 8, CANVAS_H + 8, 14);
    ctx.fill();
    for (var r = 0; r < CONFIG.ROWS; r++) {
      for (var c = 0; c < CONFIG.COLS; c++) {
        var x = c * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
        var y = r * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
        ctx.fillStyle = (r + c) % 2 === 0 ? '#2a2a45' : '#252540';
        roundRect(x, y, CONFIG.CELL_SIZE, CONFIG.CELL_SIZE, CONFIG.BORDER_RADIUS);
        ctx.fill();
      }
    }
  }

  function drawBlock(x, y, type, selected, size) {
    var s = size || CONFIG.CELL_SIZE;
    var style = CONFIG.BLOCK_STYLES[type];
    var grad = ctx.createLinearGradient(x, y, x, y + s);
    grad.addColorStop(0, style.top);
    grad.addColorStop(1, style.bottom);
    ctx.fillStyle = grad;
    roundRect(x, y, s, s, CONFIG.BORDER_RADIUS);
    ctx.fill();
    ctx.strokeStyle = style.border;
    ctx.lineWidth = 1.5;
    roundRect(x, y, s, s, CONFIG.BORDER_RADIUS);
    ctx.stroke();
    // 高光
    var hl = ctx.createLinearGradient(x, y, x + s * 0.5, y + s * 0.5);
    hl.addColorStop(0, 'rgba(255,255,255,0.35)');
    hl.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hl;
    roundRect(x + 3, y + 3, s - 6, s * 0.45, CONFIG.BORDER_RADIUS - 2);
    ctx.fill();
    // 选中高亮
    if (selected) {
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 3;
      roundRect(x - 1, y - 1, s + 2, s + 2, CONFIG.BORDER_RADIUS + 1);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
  }

  function drawBoard(sel) {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    drawBoardBackground();
    for (var r = 0; r < CONFIG.ROWS; r++) {
      for (var c = 0; c < CONFIG.COLS; c++) {
        if (board[r][c] === -1) continue;
        var x = c * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
        var y = r * (CONFIG.CELL_SIZE + CONFIG.PADDING) + CONFIG.PADDING;
        drawBlock(x, y, board[r][c], sel && sel.row === r && sel.col === c);
      }
    }
  }

  function updateUI() {
    scoreDisplay.textContent = score;
    stepsDisplay.textContent = steps;
  }

  // ================================================================
  //  Input — 点击处理
  // ================================================================

  function getClickPos(e) {
    var rect = canvas.getBoundingClientRect();
    var mx = (e.clientX - rect.left) * (CANVAS_W / rect.width);
    var my = (e.clientY - rect.top) * (CANVAS_H / rect.height);
    var col = Math.floor(mx / (CONFIG.CELL_SIZE + CONFIG.PADDING));
    var row = Math.floor(my / (CONFIG.CELL_SIZE + CONFIG.PADDING));
    var cellX = mx - col * (CONFIG.CELL_SIZE + CONFIG.PADDING) - CONFIG.PADDING;
    var cellY = my - row * (CONFIG.CELL_SIZE + CONFIG.PADDING) - CONFIG.PADDING;
    if (cellX < 0 || cellX > CONFIG.CELL_SIZE || cellY < 0 || cellY > CONFIG.CELL_SIZE) return null;
    return inBoard(row, col) ? { row: row, col: col } : null;
  }

  async function handleClick(e) {
    if (gameState !== 'playing' || isAnimating) return;
    var pos = getClickPos(e);
    if (!pos || board[pos.row][pos.col] === -1) return;
    if (!selected) { selected = { row: pos.row, col: pos.col }; drawBoard(selected); return; }
    if (selected.row === pos.row && selected.col === pos.col) { selected = null; drawBoard(); return; }
    if (!isAdjacent(selected.row, selected.col, pos.row, pos.col)) { selected = { row: pos.row, col: pos.col }; drawBoard(selected); return; }
    var r1 = selected.row, c1 = selected.col, r2 = pos.row, c2 = pos.col;
    selected = null;
    await trySwap(r1, c1, r2, c2);
  }

  async function trySwap(r1, c1, r2, c2) {
    isAnimating = true;
    await animateSwap(r1, c1, r2, c2);
    var temp = board[r1][c1]; board[r1][c1] = board[r2][c2]; board[r2][c2] = temp;
    var matches = findMatches();
    if (matches.length === 0) {
      // 无三消，撤回
      await animateSwap(r1, c1, r2, c2);
      temp = board[r1][c1]; board[r1][c1] = board[r2][c2]; board[r2][c2] = temp;
      drawBoard();
      isAnimating = false;
      return;
    }
    steps--;
    updateUI();
    await processChain(0);
    drawBoard();
    isAnimating = false;
    if (steps <= 0) { await delay(300); endGame(); }
  }

  async function processChain(chainLevel) {
    var matches = findMatches();
    if (matches.length === 0) return;
    score += calculateScore(matches.length, chainLevel);
    updateUI();
    await animateEliminate(matches);
    await animateDrop();
    await processChain(chainLevel + 1);
  }

  // ================================================================
  //  游戏流程
  // ================================================================

  function startGame() {
    gameState = 'playing';
    score = 0;
    steps = CONFIG.INITIAL_STEPS;
    selected = null;
    isAnimating = false;
    generateBoard();
    drawBoard();
    updateUI();
    startScreen.style.display = 'none';
    endScreen.style.display = 'none';
  }

  function endGame() {
    gameState = 'ended';
    finalScoreEl.textContent = score;
    endStatsEl.textContent = '剩余步数：' + steps + ' | 总分：' + score;
    endScreen.style.display = 'flex';
  }

  // ================================================================
  //  事件绑定 + 初始化
  // ================================================================
  canvas.addEventListener('click', handleClick);
  btnStart.addEventListener('click', startGame);
  btnRestart.addEventListener('click', startGame);

  // 初始绘制
  generateBoard();
  drawBoard();

})();
</script>
</body>
</html>
